name: Dependency Security Scan

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: Audit high-severity npm vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          audit_status=$?
          set -e

          if [ "$audit_status" -eq 0 ]; then
            {
              echo "## Dependency security scan"
              echo ""
              echo "No high- or critical-severity npm vulnerabilities were found."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node <<'NODE'
          const fs = require("fs");

          let audit = {};
          try {
            audit = JSON.parse(fs.readFileSync("npm-audit.json", "utf8"));
          } catch {
            audit = { error: "npm audit did not return parseable JSON." };
          }

          const counts = audit.metadata?.vulnerabilities || {};
          const lines = [
            "## Dependency security scan failed",
            "",
            "High- or critical-severity vulnerabilities were found.",
            "",
            "| Severity | Count |",
            "| --- | ---: |",
            "| Critical | " + (counts.critical || 0) + " |",
            "| High | " + (counts.high || 0) + " |",
            "| Moderate | " + (counts.moderate || 0) + " |",
            "| Low | " + (counts.low || 0) + " |",
            "",
            "Review the workflow log and run `npm audit` locally before updating dependencies.",
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
          NODE

          exit "$audit_status"

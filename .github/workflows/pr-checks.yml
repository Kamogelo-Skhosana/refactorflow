name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Next.js application
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::package-lock.json is not committed yet; using npm install until it is added."
            npm install --no-audit --no-fund
          fi

      - name: Check JavaScript and TypeScript compatibility
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js application
        run: npm run build

      - name: Verify production dependency audit
        run: npm audit --audit-level=high

      # TODO(Stage 3): Uncomment after the Docker Python execution server has tests.
